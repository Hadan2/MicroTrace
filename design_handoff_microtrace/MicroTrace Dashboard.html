<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MicroTrace — Live Network Profiler</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />

  <!-- React 18 + Babel -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; }
    body { background: #f6f8fb; color: #0f172a; overflow-y: auto; overflow-x: hidden; }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    input[type=range] { cursor: pointer; }
  </style>

  <template id="__bundler_thumbnail">
    <svg viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg">
      <rect width="120" height="80" fill="#f6f8fb"/>
      <rect x="0" y="0" width="120" height="10" fill="#ffffff"/>
      <line x1="0" y1="10" x2="120" y2="10" stroke="#e2e8f0" stroke-width="0.5"/>
      <circle cx="60" cy="42" r="14" fill="none" stroke="#2563eb" stroke-width="2"/>
      <circle cx="60" cy="42" r="5" fill="#2563eb"/>
      <line x1="30" y1="42" x2="46" y2="42" stroke="#16a34a" stroke-width="1.5"/>
      <line x1="74" y1="42" x2="90" y2="42" stroke="#dc2626" stroke-width="1.5"/>
      <line x1="60" y1="18" x2="60" y2="28" stroke="#d97706" stroke-width="1.5"/>
      <line x1="60" y1="56" x2="60" y2="66" stroke="#2563eb" stroke-width="1.5"/>
    </svg>
  </template>
</head>
<body>
  <div id="root"></div>

  <!-- Data engine (plain JS, no Babel needed) -->
  <script src="mt-data.js"></script>

  <!-- UI components (JSX via Babel) -->
  <script type="text/babel" src="mt-topology.jsx"></script>
  <script type="text/babel" src="mt-views.jsx"></script>
  <script type="text/babel" src="mt-chart.jsx"></script>
  <script type="text/babel" src="mt-panels.jsx"></script>
  <script type="text/babel" src="mt-app.jsx"></script>
</body>
</html>
